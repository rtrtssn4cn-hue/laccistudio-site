backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

site_url: https://laccistudio.com
display_url: https://laccistudio.com
logo_url: /assets/logo/lacci-primary.png

collections:
  # ---------------- Products & prices ----------------
  - name: "shop"
    label: "Shop — Products & Prices"
    files:
      - name: "products"
        label: "All Products"
        file: "content/products.json"
        description: "Add, edit, reorder, or remove products. Drag rows to reorder."
        fields:
          - name: "products"
            label: "Products"
            label_singular: "Product"
            widget: "list"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - { name: "name", label: "Product name", widget: "string" }
              - { name: "price", label: "Price ($)", widget: "number", value_type: "float", min: 0, hint: "Base price. If you use per-choice prices below, this is the lowest ('from') price." }
              - { name: "image", label: "Photo", widget: "image", required: false, hint: "Best around 1200x750. Replaces the placeholder tile." }
              - { name: "category", label: "Category", widget: "string", hint: "e.g. Drinkware, Apparel, Gifts, Home, Engraving, Stickers. This also makes the filter buttons." }
              - { name: "description", label: "Short description", widget: "text" }
              - { name: "optionLabel", label: "Options label", widget: "string", required: false, hint: "e.g. Size, Color, Item. Leave blank if the product has no choices." }
              - name: "choices"
                label: "Choices (size / color / item)"
                widget: "list"
                required: false
                summary: "{{fields.name}}{{#if fields.price}} — ${{fields.price}}{{/if}}"
                fields:
                  - { name: "name", label: "Choice", widget: "string" }
                  - { name: "price", label: "Price for this choice ($)", widget: "number", value_type: "float", required: false, min: 0, hint: "Leave blank to use the product's base price." }
              - { name: "id", label: "Internal ID (leave as-is)", widget: "string", hint: "Unique tag used behind the scenes — don't change on existing products." }

  # ---------------- Homepage text ----------------
  - name: "homepage"
    label: "Homepage Text"
    files:
      - name: "home"
        label: "Homepage"
        file: "content/home.json"
        fields:
          - { name: "heroBadge", label: "Top badge", widget: "string" }
          - { name: "heroTitleLine1", label: "Headline — line 1", widget: "string" }
          - { name: "heroTitleLine2", label: "Headline — line 2 (gold)", widget: "string" }
          - { name: "heroLead", label: "Intro sentence under headline", widget: "text" }
          - { name: "heroQuote", label: "Quote on the logo card", widget: "string" }
          - { name: "introTitle", label: "Welcome section — title", widget: "string" }
          - { name: "introText", label: "Welcome section — paragraph", widget: "text" }

  # ---------------- Contact & settings ----------------
  - name: "settings"
    label: "Contact & Settings"
    files:
      - name: "contact"
        label: "Contact, Hours, Social & Payments"
        file: "content/settings.json"
        fields:
          - { name: "email", label: "Business email", widget: "string" }
          - { name: "phone", label: "Phone (leave blank to hide)", widget: "string", required: false }
          - { name: "hoursWeekday", label: "Hours — Monday to Friday", widget: "string" }
          - { name: "hoursSaturday", label: "Hours — Saturday", widget: "string" }
          - { name: "hoursSunday", label: "Hours — Sunday", widget: "string" }
          - { name: "instagram", label: "Instagram link (blank to hide)", widget: "string", required: false }
          - { name: "facebook", label: "Facebook link (blank to hide)", widget: "string", required: false }
          - { name: "etsy", label: "Etsy link (blank to hide)", widget: "string", required: false }
          - { name: "checkoutMode", label: "Checkout mode", widget: "select", options: ["inquiry", "paypal", "snipcart"], default: "inquiry", hint: "'inquiry' emails you the order. 'paypal' or 'snipcart' take card payments (fill the key below)." }
          - { name: "orderEmail", label: "Where orders are emailed", widget: "string" }
          - { name: "paypalClientId", label: "PayPal Client ID (for paypal mode)", widget: "string", required: false }
          - { name: "snipcartApiKey", label: "Snipcart public key (for snipcart mode)", widget: "string", required: false }
          - { name: "uploadEndpoint", label: "Design upload endpoint (optional Formspree URL)", widget: "string", required: false }
